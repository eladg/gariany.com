<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <title>gariany.com</title>
  <link rel="shortcut icon" href="favicon.ico"></head>

  <style type="text/css">
    body {
      background: #000000;
      overflow: hidden;
    }
    
    #loader-continer {
      position: absolute;
      top: 25%;
      height: 50%;
      width: 100%;
    }

    .loader {
      font-size: 10px;
      margin: 50px auto;
      text-indent: -9999em;
      width: 11em;
      height: 11em;
      border-radius: 50%;
      background: #ff2611;
      background: -moz-linear-gradient(left, #ff2611 10%, rgba(255,38,17, 0) 42%);
      background: -webkit-linear-gradient(left, #ff2611 10%, rgba(255,38,17, 0) 42%);
      background: -o-linear-gradient(left, #ff2611 10%, rgba(255,38,17, 0) 42%);
      background: -ms-linear-gradient(left, #ff2611 10%, rgba(255,38,17, 0) 42%);
      background: linear-gradient(to right, #ff2611 10%, rgba(255,38,17, 0) 42%);
      position: relative;
      -webkit-animation: load3 2.5s infinite linear;
      animation: load3 2.5s infinite linear;
      -webkit-transform: translateZ(0);
      -ms-transform: translateZ(0);
      transform: translateZ(0);
    }
    .loader:before {
      width: 50%;
      height: 50%;
      background: #ff2611;
      border-radius: 100% 0 0 0;
      position: absolute;
      top: 0;
      left: 0;
      content: '';
    }
    .loader:after {
      background: #000000;
      width: 75%;
      height: 75%;
      border-radius: 50%;
      content: '';
      margin: auto;
      position: absolute;
      top: 0;
      left: 0;
      bottom: 0;
      right: 0;
    }
    @-webkit-keyframes load3 {
      0% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
      }
      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }
    @keyframes load3 {
      0% {
        -webkit-transform: rotate(0deg);
        transform: rotate(0deg);
      }
      100% {
        -webkit-transform: rotate(360deg);
        transform: rotate(360deg);
      }
    }
  </style>
  
  <body>
    <div id="loader-continer">
      <div class="loader">Loading...</div> <!-- Thanks to http://projects.lukehaas.me/css-loaders/ -->
    </div>

    <div id="canvas"></div>
    <div id="app"></div>
  <script type="text/javascript" src="bundle.js"></script></body>
</html>
